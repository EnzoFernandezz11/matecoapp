name: Build and deploy Python app to Azure Web App - matecoapp

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            backend/
            !backend/antenv/
            !backend/__pycache__/
            !backend/.env
            !backend/tests/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3EA897A2BE0C4788B23F8D05E645DCF0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_834E60391EBE4603816889E1ED6069A7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_85D62800643541738B78C504DFA3AE3B }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'matecoapp'
          slot-name: 'Production'
          package: deploy/backend
          startup-command: 'gunicorn --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 app.main:app'
          