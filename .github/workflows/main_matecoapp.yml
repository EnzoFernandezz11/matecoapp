name: Build and deploy container to Azure Web App - matecoapp

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3EA897A2BE0C4788B23F8D05E645DCF0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_834E60391EBE4603816889E1ED6069A7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_85D62800643541738B78C504DFA3AE3B }}

      - name: Login to Azure Container Registry
        run: az acr login --name tutearegistry

      - name: Build and push Docker image
        working-directory: backend
        run: |
          docker build -t tutearegistry.azurecr.io/mateco-backend:latest -t tutearegistry.azurecr.io/mateco-backend:${{ github.sha }} .
          docker push tutearegistry.azurecr.io/mateco-backend:latest
          docker push tutearegistry.azurecr.io/mateco-backend:${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Appamateco'
          slot-name: 'Production'
          images: tutearegistry.azurecr.io/mateco-backend:${{ github.sha }}
          