name: Render Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-health:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        env:
          HEALTH_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "RENDER_HEALTHCHECK_URL is not set"
            exit 1
          fi

          echo "Pinging $HEALTH_URL"
          curl --fail --show-error --silent --max-time 20 "$HEALTH_URL"
          echo "Healthcheck OK"
